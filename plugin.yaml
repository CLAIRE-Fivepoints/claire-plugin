name: fivepoints
version: 1.0.0
description: "Azure DevOps integration for TFI One project - PR comments, status, builds. Source of truth: https://github.com/CLAIRE-Fivepoints/claire-plugin"

author:
  name: "Claire Labs"
  url: "https://github.com/claire-labs/claire"

type: domain

dependencies:
  system:
    - curl
    - git
    - jq
  claire:
    min: 0.2.0

requirements:
  tools:
    - name: dotnet
      version: "8"
      install: "brew install --cask dotnet-sdk@8"
    - name: docker
      install: "Install Docker Desktop from https://docker.com"
    - name: node
      version: ">=18"
      install: "brew install node"

  tokens:
    - env: AZURE_DEVOPS_PAT
      file: "~/.config/claire/.env"
      description: "Azure DevOps — generate PAT in ADO portal"
    - env: GITHUB_TOKEN
      file: "~/.config/claire/github_manager.env"
      description: "GitHub identity for spawned sessions"

  paths:
    - name: TFIOneGit
      env: TFIONE_REPO_PATH
      default: "~/TFIOneGit"
      marker: "com.tfione.sln"
      description: "TFI One repository — clone from ADO"

commands:
  - name: "fivepoints reply"
    script: "domain/commands/reply.sh"
    description: "Reply to a PR comment thread on Azure DevOps, or approve a PR (--approve)"

  - name: "fivepoints pr-status"
    script: "domain/commands/pr-status.sh"
    description: "Show PR status, build results, reviewer votes"

  - name: "fivepoints pr-comments"
    script: "domain/commands/pr-comments.sh"
    description: "List all comment threads on a PR"

  - name: "fivepoints build-log"
    script: "domain/commands/build-log.sh"
    description: "Fetch build/pipeline results for a PR"

  - name: "fivepoints wait"
    script: "domain/commands/wait.sh"
    description: "Wait for PR activity (auto-sets AZURE_DEVOPS_PAT from git remote)"

  - name: "fivepoints ado-watch"
    script: "domain/commands/ado-watch.sh"
    description: "Continuously monitor a specific ADO PR for all comments, votes, and merge events (--pr N)"

  - name: "fivepoints validation-proof"
    script: "domain/commands/validation-proof.sh"
    description: "Record dual validation proof: frontend UI errors + Swagger API 400 responses"

  - name: "fivepoints transition"
    script: "domain/commands/transition.sh"
    description: "Transition a pipeline issue to the next role (analyst → dev → tester → ado-push)"

  - name: "fivepoints ado-push"
    script: "domain/commands/ado-push.sh"
    description: "Push branch to ADO, create PR, watch for merge, close GitHub issue on completion"

  - name: "fivepoints ado-transition"
    script: "domain/commands/ado-transition.sh"
    description: "PAT-gated transition from dev to ADO: verify branch + request write PAT + push to ADO"

  - name: "fivepoints reset-pipeline"
    script: "domain/commands/reset-pipeline.sh"
    description: "Reset all pipeline issues to clean backlog state (remove assignees, labels, worktrees, branches)"

  - name: "fivepoints reset-pbi"
    script: "domain/commands/reset-pbi.sh"
    description: "Factory reset a single PBI (branches, worktrees, PR, agent comments, labels, state, release assets) so the pipeline can replay from zero"

  - name: "fivepoints install-hooks"
    script: "domain/commands/install-hooks.sh"
    description: "Install TFI One pre-commit hook into TFIOneGit (branch naming, no GRANT/DENY, no d.ts, no biz logic tests)"

  - name: "fivepoints test-env-start"
    script: "domain/commands/test-env-start.sh"
    description: "Start full TFI One stack for local testing (SQL Server + .NET API + Vite frontend)"

  - name: "fivepoints bridge"
    script: "domain/commands/bridge.sh"
    description: "Manage the Azure DevOps → GitHub issue bridge daemon (start/stop/status/logs/run)"

  - name: "fivepoints azure-issue-bridge"
    script: "domain/commands/azure-issue-bridge.sh"
    description: "Watch Gmail for ADO PBI assignment emails → create GitHub issues in fivepoints"

  - name: "fivepoints land"
    script: "domain/commands/land.sh"
    description: "End-to-end finish-existing-PR: backup, rebase, 4 gates, e2e, push (no-force fallback), proof post, ado-watch"

  - name: "fivepoints rebase-no-force"
    script: "domain/commands/rebase-no-force.sh"
    description: "Rebase branch onto ADO target and push without ForcePush permission (snapshot+merge strategy)"

github_orgs:
  - CLAIRE-Fivepoints

persona:
  default: fivepoints-dev
  roles:
    analyst: fivepoints-analyst
    tester: fivepoints-tester

checklists:
  "role:analyst": "operational/CHECKLIST_ANALYST"
  "role:tester": "operational/CHECKLIST_TESTER"
  "role:dev": "operational/CHECKLIST_DEV_PIPELINE"

config:
  api_version: "7.1"
